[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "GPL-2.0",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
skip = [
    # serialport uses nix 0.26 (bitflags 1), mio-serial uses nix 0.29 (bitflags 2).
    { crate = "bitflags@1" },
    { crate = "nix@0.26" },
    # serialport/mio-serial Windows deps.
    { crate = "windows-sys@0.52" },
    { crate = "windows-sys@0.59" },
    # thiserror 1.x pulled by transitive deps alongside our thiserror 2.x.
    { crate = "thiserror@1" },
    { crate = "thiserror-impl@1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
