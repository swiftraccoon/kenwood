name: Fedora
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y gcc rust cargo clippy
      - run: cargo check
        working-directory: thd75
      - run: cargo check
        working-directory: thd75-tui
      - run: cargo clippy -- -D warnings
        working-directory: thd75
      - run: cargo clippy -- -D warnings
        working-directory: thd75-tui
      - run: cargo test --lib
        working-directory: thd75
