name: Fedora
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y gcc
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy
      - run: cargo check
        working-directory: thd75
      - run: cargo check
        working-directory: thd75-tui
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75-tui
      - run: cargo test --lib
        working-directory: thd75
