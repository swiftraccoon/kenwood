name: Fedora
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - run: dnf install -y gcc
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy
      - run: cargo check
        working-directory: thd75
      - run: cargo check
        working-directory: thd75-tui
      - run: cargo check
        working-directory: dstar-gateway
      - run: cargo check
        working-directory: thd75-repl
      - run: cargo check
        working-directory: mbelib-rs
      - run: cargo check
        working-directory: stargazer
      - run: cargo build
        working-directory: thd75
      - run: cargo build
        working-directory: thd75-tui
      - run: cargo build
        working-directory: dstar-gateway
      - run: cargo build
        working-directory: thd75-repl
      - run: cargo build
        working-directory: mbelib-rs
      - run: cargo build
        working-directory: stargazer
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75-tui
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: dstar-gateway
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75-repl
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: mbelib-rs
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: stargazer
      - run: cargo test --lib
        working-directory: thd75
      - run: cargo test
        working-directory: thd75-tui
      - run: cargo test
        working-directory: dstar-gateway
      - run: cargo test
        working-directory: thd75-repl
      - run: cargo test
        working-directory: mbelib-rs
      - run: cargo test --bins
        working-directory: stargazer
