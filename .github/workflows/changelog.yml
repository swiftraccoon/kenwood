name: changelog

on:
  pull_request:
    paths:
      - 'dstar-gateway-core/**/*.rs'
      - 'dstar-gateway/**/*.rs'
      - 'dstar-gateway-server/**/*.rs'

# Minimum required permissions: the check reads the diff between PR and
# base branch, no writes needed. BASE_REF input is already properly
# shielded via `env:` (not inlined into the run: shell).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md updated
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base="origin/${BASE_REF}"
          if git diff --name-only "${base}"...HEAD | grep -qE '^(dstar-gateway-core|dstar-gateway|dstar-gateway-server)/.*\.rs$' \
             && ! git diff --name-only "${base}"...HEAD | grep -q '^dstar-gateway/CHANGELOG\.md$'; then
            echo "PR touches Rust code in dstar-gateway-core, dstar-gateway, or dstar-gateway-server"
            echo "but does not update dstar-gateway/CHANGELOG.md."
            echo ""
            echo "Add an entry under [Unreleased] describing the change."
            exit 1
          fi
