name: Docs
on:
  push:
    branches: [main]
jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - run: cargo doc --no-deps
        working-directory: thd75
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: echo '<meta http-equiv="refresh" content="0;url=kenwood_thd75/index.html">' > thd75/target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: thd75/target/doc
      - uses: actions/deploy-pages@v4
