name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - run: cargo check
        working-directory: thd75
      - run: cargo check
        working-directory: thd75-tui

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - run: cargo test --lib
        working-directory: thd75

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy
      - run: cargo clippy -- -D warnings
        working-directory: thd75
      - run: cargo clippy -- -D warnings
        working-directory: thd75-tui

  docs:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - run: cargo doc --no-deps
        working-directory: thd75
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: echo '<meta http-equiv="refresh" content="0;url=kenwood_thd75/index.html">' > thd75/target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: thd75/target/doc
      - uses: actions/deploy-pages@v4
        if: github.ref == 'refs/heads/main'
