name: Ubuntu
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy, rustfmt
      - run: cargo check
        working-directory: thd75
      - run: cargo check
        working-directory: thd75-tui
      - run: cargo check
        working-directory: dstar-gateway
      - run: cargo check
        working-directory: thd75-repl
      - run: cargo build
        working-directory: thd75
      - run: cargo build
        working-directory: thd75-tui
      - run: cargo build
        working-directory: dstar-gateway
      - run: cargo build
        working-directory: thd75-repl
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75-tui
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: dstar-gateway
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: thd75-repl
      - run: cargo test --lib
        working-directory: thd75
      - run: cargo test
        working-directory: thd75-tui
      - run: cargo test
        working-directory: dstar-gateway
      - run: cargo test
        working-directory: thd75-repl
      - run: cargo doc --no-deps
        working-directory: thd75
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: cargo fmt -- --check
        working-directory: thd75
      - run: cargo fmt -- --check
        working-directory: thd75-tui
      - run: cargo fmt -- --check
        working-directory: dstar-gateway
      - run: cargo fmt -- --check
        working-directory: thd75-repl
